<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Estoque</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Customização de cores e fontes */
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f7f9fc; /* Cor de fundo suave */
        }

        .card-header {
            background-color: #6c5ce7;
            color: white;
            font-weight: bold;
            font-size: 1.25rem;
            border-radius: 10px 10px 0 0;
        }

        .btn-primary {
            background-color: #ff6347; /* Cor vibrante para o botão */
            border-color: #ff6347;
        }

        .btn-primary:hover {
            background-color: #ff4500; /* Alteração de cor no hover */
            border-color: #ff4500;
        }

        .btn-sm {
            border-radius: 5px;
            padding: 5px 10px;
        }

        .table-striped tbody tr:nth-of-type(odd) {
            background-color: #f1f4f9; /* Fundo alternado para linhas */
        }

        .table th, .table td {
            padding: 15px; /* Melhorar o espaçamento das células */
        }

        .form-label {
            font-weight: bold;
            color: #333;
        }

        .form-control {
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .form-control:focus {
            border-color: #6c5ce7;
            box-shadow: 0 0 5px rgba(108, 92, 231, 0.5);
        }

        /* Efeito de hover nos produtos na tabela */
        .table td {
            transition: background-color 0.3s ease;
        }

        .table td:hover {
            background-color: #f8f9fa;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>
<div class="container my-5">
    <h1 class="text-center text-info mb-5">Sistema de Estoque</h1>

  
    <div class="card">
        <div class="card-header">
            <h4>Cadastrar Produto</h4>
        </div>
        <div class="card-body">
            <form id="cadastroProdutoForm">
                <input type="hidden" id="produtoId">
                <div class="mb-3">
                    <label for="produtoNome" class="form-label">Nome do Produto</label>
                    <input type="text" class="form-control" id="produtoNome" required>
                </div>
                <div class="mb-3">
                    <label for="produtoDescricao" class="form-label">Descrição</label>
                    <input type="text" class="form-control" id="produtoDescricao" required>
                </div>
                <div class="mb-3">
                    <label for="produtoPreco" class="form-label">Preço</label>
                    <input type="number" class="form-control" id="produtoPreco" step="any" required>
                </div>
                <div class="mb-3">
                    <label for="produtoQuantidade" class="form-label">Quantidade</label>
                    <input type="number" class="form-control" id="produtoQuantidade" required>
                </div>
                <button type="submit" class="btn btn-primary">Cadastrar Produto</button>
            </form>
        </div>
    </div>


    <div class="card mt-4">
        <div class="card-header">
            <h4>Lista de Produtos</h4>
        </div>
        <div class="card-body">
            <table class="table table-striped">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Produto</th>
                    <th>Descrição</th>
                    <th>Valor</th>
                    <th>Quantidade</th>
                    <th>Ações</th>
                </tr>
                </thead>
                <tbody id="produtosList">

                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Scripts do Bootstrap e código JavaScript -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>

    document.getElementById('cadastroProdutoForm').addEventListener('submit', function (event) {
        event.preventDefault();

        const nome = document.getElementById('produtoNome').value;
        const descricao = document.getElementById('produtoDescricao').value;
        const preco = parseFloat(document.getElementById('produtoPreco').value);
        const quantidade = parseInt(document.getElementById('produtoQuantidade').value);

        const produto = { nome, descricao, preco, quantidade };
        const produtoId = document.getElementById('produtoId').value;

        if (produtoId) {

            fetch(`/produtos/${produtoId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(produto)
            })
                .then(response => response.json())
                .then(updatedProduct => {
                    alert('Produto atualizado com sucesso!');
                    atualizarTabela(updatedProduct);
                    resetForm(); // Limpar o formulário após a edição
                })
                .catch(error => console.error('Erro ao atualizar produto:', error));
        } else {

            fetch('/produtos', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(produto)
            })
                .then(response => response.json())
                .then(data => {
                    // Adiciona o produto na tabela
                    const tabelaProdutos = document.getElementById('produtosList');
                    const row = tabelaProdutos.insertRow();
                    row.innerHTML = `
                        <td>${data.id}</td>  <!-- Exibe o ID -->
                        <td>${data.nome}</td>
                        <td>${data.descricao}</td>  <!-- Exibe a descrição -->
                        <td>R$ ${data.preco.toFixed(2)}</td>
                        <td>${data.quantidade}</td>
                        <td>
                            <button class="btn btn-warning btn-sm" onclick="editarProduto(${data.id})">Editar</button>
                            <button class="btn btn-danger btn-sm" onclick="deletarProduto(${data.id})">Deletar</button>
                        </td>
                    `;
                    resetForm(); // Limpar o formulário após cadastro
                })
                .catch(error => console.error('Erro ao cadastrar produto:', error));
        }
    });


    function editarProduto(id) {
        fetch(`/produtos/${id}`)
            .then(response => response.json())
            .then(data => {
                // Preenche o formulário com os dados do produto
                document.getElementById('produtoNome').value = data.nome;
                document.getElementById('produtoDescricao').value = data.descricao; // Preenche a descrição
                document.getElementById('produtoPreco').value = data.preco;
                document.getElementById('produtoQuantidade').value = data.quantidade;
                document.getElementById('produtoId').value = data.id; // Armazena o ID no campo oculto
            })
            .catch(error => console.error('Erro ao buscar produto para editar:', error));
    }


    function atualizarTabela(produto) {
        const rows = document.getElementById('produtosList').rows;
        for (let row of rows) {
            if (row.cells[0].textContent == produto.id) {
                row.cells[1].textContent = produto.nome;
                row.cells[2].textContent = produto.descricao;  // Atualiza a descrição
                row.cells[3].textContent = `R$ ${produto.preco.toFixed(2)}`;
                row.cells[4].textContent = produto.quantidade;
                break;
            }
        }
    }


    function deletarProduto(id) {
        if (confirm('Tem certeza que deseja deletar este produto?')) {
            fetch(`/produtos/${id}`, {
                method: 'DELETE'
            })
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Erro ao deletar produto');
                    }
                    alert('Produto deletado com sucesso!');
                    // Remover a linha da tabela após exclusão bem-sucedida
                    const rows = document.getElementById('produtosList').rows;
                    for (let row of rows) {
                        if (row.cells[0].textContent == id) {
                            row.remove();
                            break;
                        }
                    }
                })
                .catch(error => {
                    console.error('Erro ao deletar produto:', error);
                    alert('Não foi possível deletar o produto');
                });
        }
    }


    function resetForm() {
        document.getElementById('produtoId').value = '';  // Limpa o campo de ID
        document.getElementById('produtoNome').value = '';
        document.getElementById('produtoDescricao').value = '';  // Limpa a descrição
        document.getElementById('produtoPreco').value = '';
        document.getElementById('produtoQuantidade').value = '';
    }
</script>
</body>

</html>
